name: tests
on:
  pull_request:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r api/requirements.txt jsonschema pytest pytest-cov
      - name: Validate CCM if present
        run: |
          if [ -f integrations/runtime/runtime.ccm.json ]; then
            python - <<'PY'
            import json
            from jsonschema import validate
            with open('integrations/runtime/runtime.ccm.json','r') as f:
                doc = json.load(f)
            with open('schema/ccm.schema.json','r') as f:
                schema = json.load(f)
            validate(doc, schema)
            print("CCM schema OK:", len(doc.get("observations", [])))
PY
          else
            echo "No CCM yet, skipping."
          fi
      - name: Run pytest with coverage
        run: |
          pytest -q --cov=signet --cov=api --cov-report=term --cov-report=xml
      - name: Enforce coverage >=80%
        run: |
          python - <<'PY'
          import xml.etree.ElementTree as ET
          t = ET.parse('coverage.xml')
          root = t.getroot()
          total = root.attrib.get('line-rate')
          if total is None:
              # fallback: compute from packages
              rates = [float(p.attrib.get('line-rate','0')) for p in root.findall('packages/package')]
              cov = sum(rates)/len(rates) if rates else 0
          else:
              cov = float(total)
          print(f"coverage: {cov*100:.1f}%")
          assert cov >= 0.80, f"coverage below 80%: {cov*100:.1f}%"
PY
