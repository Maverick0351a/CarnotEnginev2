name: worklog-check
on:
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check WORKLOG updated
        run: |
          git fetch origin ${{ github.base_ref }} --depth=1
          if git diff --name-only origin/${{ github.base_ref }}...HEAD | grep -q '^WORKLOG.md$'; then
            echo "WORKLOG updated."
          else
            echo "WORKLOG not updated. If intentional, add label 'worklog-bypass'."
            exit 1
          fi
